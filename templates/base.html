<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Auto Test Case Generator{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #f7f4ef;
        --ink: #121111;
        --muted: #5a5855;
        --accent: #0f7b6c;
        --accent-2: #e06a2e;
        --card: #ffffff;
        --border: #e2ddd5;
        --shadow: 0 12px 30px rgba(17, 16, 15, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 15% 20%, #fff7e1 0%, transparent 55%),
          radial-gradient(circle at 85% 10%, #dff7f1 0%, transparent 45%),
          linear-gradient(130deg, #f7f4ef 0%, #f1ece4 100%);
        min-height: 100vh;
      }

      .shell {
        max-width: 1280px;
        margin: 0 auto;
        padding: 32px 24px 60px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 28px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 700;
        letter-spacing: 0.4px;
      }

      .brand-mark {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: conic-gradient(from 210deg, var(--accent), var(--accent-2));
        box-shadow: var(--shadow);
      }

      .nav-pill {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid var(--border);
        font-size: 14px;
        color: var(--muted);
      }

      main {
        display: grid;
        gap: 24px;
      }

      .hero {
        display: grid;
        gap: 14px;
      }

      .eyebrow {
        font-family: "IBM Plex Mono", monospace;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-size: 12px;
        color: var(--accent);
      }

      h1 {
        margin: 0;
        font-size: clamp(30px, 3vw, 40px);
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 18px;
      }

      .full-span {
        grid-column: 1 / -1;
      }

      .card {
        background: var(--card);
        border-radius: 24px;
        padding: 22px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--border);
        font-family: inherit;
        background: #faf8f4;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 20px;
        border-radius: 14px;
        border: none;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        box-shadow: 0 12px 24px rgba(15, 123, 108, 0.2);
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      .btn.secondary {
        background: #f3eee6;
        color: var(--ink);
        border: 1px solid var(--border);
        box-shadow: none;
      }

      .error-box {
        padding: 16px;
        border-radius: 16px;
        border: 1px solid #f0b6a3;
        background: #fff2ec;
        color: #8a2c0c;
      }

      .tag {
        display: inline-flex;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(15, 123, 108, 0.1);
        color: var(--accent);
        font-size: 12px;
        font-family: "IBM Plex Mono", monospace;
      }

      .file-list {
        display: grid;
        gap: 8px;
        padding-left: 0;
        list-style: none;
        margin: 0;
      }

      .file-item {
        padding: 10px 14px;
        border-radius: 12px;
        border: 1px dashed var(--border);
        background: #faf8f4;
        font-family: "IBM Plex Mono", monospace;
        font-size: 13px;
      }

      .code-box {
        background: #101414;
        color: #e7f2ef;
        padding: 20px;
        border-radius: 18px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 13px;
        overflow-x: auto;
      }

      .table-wrap {
        overflow-x: auto;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: #faf8f4;
      }

      .csv-table {
        width: 100%;
        min-width: 860px;
        border-collapse: collapse;
      }

      .csv-table th,
      .csv-table td {
        text-align: left;
        border-bottom: 1px solid var(--border);
        padding: 10px 12px;
        vertical-align: top;
      }

      .csv-table input {
        min-width: 160px;
      }

      .image-strip {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(220px, 1fr);
        gap: 14px;
        overflow-x: auto;
        padding-bottom: 8px;
      }

      .image-strip img {
        width: 100%;
        height: 160px;
        object-fit: cover;
        border-radius: 16px;
        border: 1px solid var(--border);
      }

      .lightbox {
        position: fixed;
        inset: 0;
        background: rgba(10, 12, 12, 0.7);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 24px;
      }

      .lightbox.open {
        display: flex;
      }

      .lightbox-card {
        background: #0f1212;
        border-radius: 20px;
        border: 1px solid #1f2626;
        padding: 16px;
        max-width: min(900px, 92vw);
        max-height: 88vh;
        display: grid;
        gap: 12px;
      }

      .lightbox-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: #dce8e5;
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
      }

      .lightbox-img {
        max-width: 100%;
        max-height: 70vh;
        border-radius: 16px;
        object-fit: contain;
        background: #111616;
      }

      .lightbox-actions {
        display: flex;
        gap: 8px;
      }

      .lightbox-btn {
        background: #1b2424;
        color: #dce8e5;
        border: 1px solid #2a3434;
        padding: 8px 12px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 12px;
      }

      @media (max-width: 720px) {
        header {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div class="brand">
          <div class="brand-mark"></div>
          <div>
            Auto Test Case Generator
            <div class="tag">MVP</div>
          </div>
        </div>
        <div class="nav-pill">PDF + Image inputs | CSV | Selenium / Playwright</div>
      </header>
      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
    <div class="lightbox" id="lightbox" aria-hidden="true">
      <div class="lightbox-card" role="dialog" aria-modal="true">
        <div class="lightbox-header">
          <span id="lightboxTitle">Preview</span>
          <div class="lightbox-actions">
            <button class="lightbox-btn" type="button" id="lightboxPrev">Prev</button>
            <button class="lightbox-btn" type="button" id="lightboxNext">Next</button>
            <button class="lightbox-btn" type="button" id="lightboxClose">Close</button>
          </div>
        </div>
        <img id="lightboxImg" class="lightbox-img" src="" alt="Preview">
      </div>
    </div>
    <script>
      (function () {
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightboxImg");
        const lightboxTitle = document.getElementById("lightboxTitle");
        const closeBtn = document.getElementById("lightboxClose");
        const prevBtn = document.getElementById("lightboxPrev");
        const nextBtn = document.getElementById("lightboxNext");
        let images = [];
        let currentIndex = 0;

        function openLightbox(index) {
          if (!images.length) {
            return;
          }
          currentIndex = index;
          const item = images[currentIndex];
          lightboxImg.src = item.src;
          lightboxTitle.textContent = item.title || "Preview";
          lightbox.classList.add("open");
          lightbox.setAttribute("aria-hidden", "false");
        }

        function closeLightbox() {
          lightbox.classList.remove("open");
          lightbox.setAttribute("aria-hidden", "true");
        }

        function showNext(delta) {
          if (!images.length) {
            return;
          }
          currentIndex = (currentIndex + delta + images.length) % images.length;
          openLightbox(currentIndex);
        }

        document.addEventListener("click", function (event) {
          const target = event.target.closest("[data-lightbox]");
          if (!target) {
            return;
          }
          images = Array.from(document.querySelectorAll("[data-lightbox]")).map((node) => ({
            src: node.dataset.full || node.src,
            title: node.dataset.title || node.alt,
          }));
          const index = images.findIndex((item) => item.src === (target.dataset.full || target.src));
          openLightbox(index < 0 ? 0 : index);
        });

        closeBtn.addEventListener("click", closeLightbox);
        lightbox.addEventListener("click", function (event) {
          if (event.target === lightbox) {
            closeLightbox();
          }
        });
        prevBtn.addEventListener("click", function () {
          showNext(-1);
        });
        nextBtn.addEventListener("click", function () {
          showNext(1);
        });
        document.addEventListener("keydown", function (event) {
          if (!lightbox.classList.contains("open")) {
            return;
          }
          if (event.key === "Escape") {
            closeLightbox();
          } else if (event.key === "ArrowRight") {
            showNext(1);
          } else if (event.key === "ArrowLeft") {
            showNext(-1);
          }
        });
      })();
    </script>
  </body>
</html>
